name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── 1. Run tests before building ──────────────────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ── 2a. macOS build ────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS .app
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS app
        run: bash build/build_mac.sh

      - name: Zip .app bundle
        run: |
          VERSION="${{ github.ref_name }}"
          cd dist/mac
          zip -r "../../pptx-exporter-macos-${VERSION}.zip" pptx-exporter.app
          echo "ASSET_MAC=pptx-exporter-macos-${VERSION}.zip" >> $GITHUB_ENV

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: "pptx-exporter-macos-${{ github.ref_name }}.zip"
          retention-days: 1

  # ── 2b. Windows build ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows exe
        run: build\build_windows.bat

      - name: Zip .exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "pptx-exporter-windows-${version}.zip"
          Compress-Archive -Path "dist\windows\pptx-exporter.exe" -DestinationPath $zipName
          echo "ASSET_WIN=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: "pptx-exporter-windows-${{ github.ref_name }}.zip"
          retention-days: 1

  # ── 3. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' to match CHANGELOG section headers like ## [1.2.3]
          SEMVER="${VERSION#v}"
          # Extract the block between this version header and the next ## header
          BODY=$(awk "/^## \[${SEMVER}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}"
          fi
          # Write body to a file to avoid quoting issues
          echo "$BODY" > release_body.md

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            pptx-exporter-macos-${{ github.ref_name }}.zip
            pptx-exporter-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
